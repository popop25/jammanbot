<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>잠만봇</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="chat-shell">
      <header class="topbar">
        <div class="bot-profile">
          <img class="avatar" src="/static/image.png" alt="잠만봇" />
          <div>
            <h1>잠만봇</h1>
            <p>밥 먹고 기록하고 다시 눕는 중</p>
          </div>
        </div>
        <button id="settingsToggle" class="icon-button" type="button" aria-label="설정">설정</button>
      </header>

      <section id="settingsPanel" class="settings-panel" hidden>
        <label>
          기본 식당
          <select id="campusSelect"></select>
        </label>
        <label>
          구내식당
          <select id="cafeteriaSelect"></select>
        </label>
        <div class="settings-actions">
          <button id="saveSettingsBtn" class="secondary-button" type="button">저장</button>
          <button id="clearChatBtn" class="danger-button" type="button">대화 초기화</button>
        </div>
      </section>

      <section id="messageList" class="message-list" aria-live="polite"></section>

      <section id="emptyState" class="empty-state">
        <img class="empty-avatar" src="/static/image.png" alt="" />
        <h2>무슨 밥 얘기부터 할까?</h2>
        <div class="prompt-row">
          <button type="button" data-prompt="오늘 점심 뭐야?">오늘 점심 뭐야?</button>
          <button type="button" data-prompt="A코너 먹었고 맛있었어">A코너 먹었고 맛있었어</button>
          <button type="button" data-prompt="이번 주 뭐 먹었지?">이번 주 뭐 먹었지?</button>
          <button type="button" data-prompt="오늘 뭐 먹을까?">오늘 뭐 먹을까?</button>
        </div>
      </section>

      <form id="composer" class="composer">
        <textarea id="messageInput" rows="1" placeholder="잠만봇에게 메시지 보내기" autocomplete="off"></textarea>
        <button id="sendBtn" type="submit">전송</button>
      </form>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <img class="message-avatar" alt="" />
        <div class="message-body">
          <div class="message-meta">
            <strong></strong>
            <time></time>
          </div>
          <div class="bubble"></div>
          <div class="attachments"></div>
        </div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
